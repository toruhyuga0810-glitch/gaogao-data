<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GAOGAO 圃場生育状況</title>
<link rel="icon" type="image/png" href="img/favicon.png?v=3">
<link rel="stylesheet" href="assets/app.css?v=25">
<style>
  .chipsbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .fchip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 15px;font-size:13px;cursor:pointer;color:var(--sub);font-weight:600}
  .fchip.active{background:var(--green);color:#fff;border-color:var(--green)}
  .dgroup{margin:22px 0 8px}
  .dhead{font-size:14px;font-weight:700;color:var(--green-d);border-left:4px solid var(--green);padding-left:10px;margin-bottom:10px}
  .dhead .cnt{color:var(--sub);font-weight:600;font-size:12px;margin-left:8px}
  /* 投稿カード（テキスト＋写真セット） */
  .postcard{background:rgba(255,255,255,.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
  .pmeta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .ftag{background:var(--okbg);color:var(--ok);font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
  .pwho{color:var(--sub);font-size:12px}
  .ptext{font-size:14px;line-height:1.8;white-space:pre-wrap;background:#f6f9f6;border-radius:10px;padding:10px 14px;margin-bottom:10px}
  .gallery{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .ph{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;background:#e8ece8;aspect-ratio:1;border:0;padding:0}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .15s}
  .ph:hover img{transform:scale(1.04)}
  .lightbox{position:fixed;inset:0;background:rgba(12,18,14,.9);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .lightbox img{max-width:94vw;max-height:78vh;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .lb-meta{color:#fff;font-size:13px;margin-top:12px;text-align:center;line-height:1.7;max-width:700px;white-space:pre-wrap}
  .lb-close{position:absolute;top:14px;right:18px;background:rgba(255,255,255,.15);border:0;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:0;color:#fff;font-size:30px;width:48px;height:48px;border-radius:50%;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;padding-bottom:4px}
  .lb-nav:hover{background:rgba(255,255,255,.32)}
  .lb-nav.prev{left:12px}
  .lb-nav.next{right:12px}
  .lb-count{color:rgba(255,255,255,.75);font-size:12px;margin-top:6px}
  @media (max-width:600px){ .lb-nav{width:40px;height:40px;font-size:24px} }
</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0" aria-hidden="true"><filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox"><feTurbulence type="fractalNoise" baseFrequency="0.001 0.005" numOctaves="1" seed="17" result="turbulence"/><feComponentTransfer in="turbulence" result="mapped"><feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5"/><feFuncG type="gamma" amplitude="0" exponent="1" offset="0"/><feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5"/></feComponentTransfer><feGaussianBlur in="turbulence" stdDeviation="3" result="softMap"/><feSpecularLighting in="softMap" surfaceScale="5" specularConstant="1" specularExponent="100" lighting-color="white" result="specLight"><fePointLight x="-200" y="-200" z="300"/></feSpecularLighting><feComposite in="specLight" operator="in" in2="SourceGraphic" result="specularSaturated"/><feDisplacementMap in="SourceGraphic" in2="softMap" scale="120" xChannelSelector="R" yChannelSelector="G"/></filter></svg>
<header class="h-photo"><div class="wrap">
  <h1><img src="img/logo-h.png" alt="GAOGAO Farm" class="logotype"><span class="h1sub">発注ポータル</span></h1>
  <div class="lead">圃場生育状況 — 畑のいまを写真でお届けします</div>
  <nav class="tabs">
    <a href="index.html">ホーム</a>
    <a href="hatchu.html">供給・発注</a>
    <a href="order-confirm.html">注文確認</a>
    <a href="jisseki.html">納品実績</a>
    <span class="navsp"></span>
    <a class="sub" href="keiziban.html">掲示板</a>
    <a class="sub active" href="photos.html">圃場生育状況</a>
    <a class="sub adm" href="admin.html">承認(管理)</a>
  </nav>
</div></header>

<div class="wrap">
  <div class="card">
    <div class="chipsbar" id="farm-chips"><span class="muted">読み込み中…</span></div>
    <div class="muted" style="margin-top:10px">Discord「圃場別生育状況-写真共有」の写真が自動で反映されます（約30分ごと・日付ごとに表示）。写真をクリックすると拡大します。</div>
  </div>

  <div id="state" class="card state">読み込み中…</div>
  <div id="groups"></div>
</div>

<div class="lightbox hide" id="lightbox">
  <button class="lb-close" id="lb-close">×</button>
  <button class="lb-nav prev hide" id="lb-prev" aria-label="前の写真">‹</button>
  <button class="lb-nav next hide" id="lb-next" aria-label="次の写真">›</button>
  <img id="lb-img" src="" alt="圃場写真">
  <div class="lb-meta" id="lb-meta"></div>
  <div class="lb-count" id="lb-count"></div>
</div>

<footer>GAOGAO 圃場生育状況 ／ Discord「圃場別生育状況-写真共有」と連携</footer>

<script src="assets/orders.js"></script>
<script>
let PHOTOS=[], FILTER='', VIEW=[], CUR=-1;
const FARM_ORDER=['第1圃場','第2圃場','第3圃場','第4圃場'];

function dkey(ts){ const d=new Date(ts); if(isNaN(d)) return '日付不明';
  return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+'（'+'日月火水木金土'[d.getDay()]+'）'; }

function render(){
  const list=PHOTOS.filter(p=>{
    if(!FILTER) return true;
    if(FILTER==='未分類') return !p.farm;
    return p.farm===FILTER;
  });
  const g=document.getElementById('groups'), st=document.getElementById('state');
  VIEW=[];
  if(!list.length){ g.innerHTML=''; st.classList.remove('hide'); st.textContent='該当する写真がありません。'; return; }
  st.classList.add('hide');
  // 日付ごと → さらに投稿（同一メッセージ）ごとにグループ化（新しい順）
  const days=new Map();
  list.forEach(p=>{ const k=dkey(p.ts); if(!days.has(k)) days.set(k,new Map());
    const posts=days.get(k); const mk=p.ts+'|'+(p.author||'');
    if(!posts.has(mk)) posts.set(mk,[]); posts.get(mk).push(p); });
  let h='';
  for(const [day,posts] of days){
    let total=0; posts.forEach(arr=>total+=arr.length);
    h+='<div class="dgroup"><div class="dhead">'+esc(day)+'<span class="cnt">'+total+'枚</span></div>';
    for(const [,arr] of posts){
      const p0=arr[0];
      const t=new Date(p0.ts); const hm=isNaN(t)?'':(('0'+t.getHours()).slice(-2)+':'+('0'+t.getMinutes()).slice(-2));
      h+='<div class="postcard"><div class="pmeta">'
        +(p0.farm?'<span class="ftag">'+esc(p0.farm)+'</span>':'')
        +'<span class="pwho">'+esc(hm)+(p0.author?'・'+esc(p0.author):'')+'</span></div>'
        +(p0.caption?'<div class="ptext">'+esc(p0.caption)+'</div>':'')
        +'<div class="gallery">';
      arr.forEach(p=>{
        const v=VIEW.length; VIEW.push(p);
        h+='<button class="ph" data-v="'+v+'"><img loading="lazy" src="'+esc(p.src)+'" alt="圃場写真"></button>';
      });
      h+='</div></div>';
    }
    h+='</div>';
  }
  g.innerHTML=h;
  g.querySelectorAll('.ph').forEach(b=>b.addEventListener('click',()=>openLB(+b.dataset.v)));
}

function buildChips(){
  const present=new Set(PHOTOS.map(p=>p.farm).filter(Boolean));
  const farms=FARM_ORDER.filter(f=>present.has(f));
  const hasUnsorted=PHOTOS.some(p=>!p.farm);
  let chips=[{v:'',t:'すべて'}];
  farms.forEach(f=>chips.push({v:f,t:f}));
  if(hasUnsorted && farms.length) chips.push({v:'未分類',t:'未分類'});
  const el=document.getElementById('farm-chips');
  el.innerHTML=chips.map(c=>'<button class="fchip'+(FILTER===c.v?' active':'')+'" data-v="'+esc(c.v)+'">'+esc(c.t)+'</button>').join('');
  el.querySelectorAll('.fchip').forEach(b=>b.addEventListener('click',()=>{ FILTER=b.dataset.v; buildChips(); render(); }));
}

function openLB(v){
  if(v<0 || v>=VIEW.length) return;
  const p=VIEW[v]; CUR=v;
  document.getElementById('lb-img').src=p.src;
  const d=new Date(p.ts);
  const when=isNaN(d)?'':(d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate());
  document.getElementById('lb-meta').textContent=[when, p.farm, p.author].filter(Boolean).join('　');
  document.getElementById('lb-count').textContent=(v+1)+' / '+VIEW.length+' 枚';
  document.getElementById('lb-prev').classList.toggle('hide', v===0);
  document.getElementById('lb-next').classList.toggle('hide', v===VIEW.length-1);
  document.getElementById('lightbox').classList.remove('hide');
}
function closeLB(){ document.getElementById('lightbox').classList.add('hide'); }
function lbOpen(){ return !document.getElementById('lightbox').classList.contains('hide'); }
function lbNav(d){ if(lbOpen()) openLB(CUR+d); }
document.getElementById('lb-close').addEventListener('click',closeLB);
document.getElementById('lb-prev').addEventListener('click',e=>{ e.stopPropagation(); lbNav(-1); });
document.getElementById('lb-next').addEventListener('click',e=>{ e.stopPropagation(); lbNav(1); });
document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target.id==='lightbox') closeLB(); });
document.addEventListener('keydown',e=>{
  if(!lbOpen()) return;
  if(e.key==='Escape') closeLB();
  else if(e.key==='ArrowLeft') lbNav(-1);
  else if(e.key==='ArrowRight') lbNav(1);
});
// ホイール／トラックパッドのスクロールで前後（連続発火は間引く）
let wheelAt=0;
document.getElementById('lightbox').addEventListener('wheel',e=>{
  e.preventDefault();
  const now=Date.now(); if(now-wheelAt<250) return; wheelAt=now;
  const d=(Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY);
  if(d!==0) lbNav(d>0?1:-1);
},{passive:false});
// スマホはスワイプで前後
let touchX=null;
document.getElementById('lightbox').addEventListener('touchstart',e=>{ touchX=e.touches[0].clientX; },{passive:true});
document.getElementById('lightbox').addEventListener('touchend',e=>{
  if(touchX==null) return;
  const dx=e.changedTouches[0].clientX-touchX; touchX=null;
  if(Math.abs(dx)>40) lbNav(dx<0?1:-1);
},{passive:true});

(async function(){
  try{
    const res=await fetch('photos/index.json?t='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw new Error('no photos');
    PHOTOS=await res.json();
    PHOTOS.sort((a,b)=> a.ts<b.ts?1:-1);
    if(!PHOTOS.length) throw new Error('no photos');
    buildChips(); render();
  }catch(e){
    document.getElementById('farm-chips').innerHTML='';
    document.getElementById('state').innerHTML='写真はまだありません。<br><span class="muted">Discord「圃場別生育状況-写真共有」に投稿すると、約30分でここに表示されます。</span>';
  }
})();
</script>
</body>
</html>
