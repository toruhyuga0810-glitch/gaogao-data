<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GAOGAO 承認・受付管理</title>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="assets/app.css">
<style>
  .order{border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:14px;overflow:hidden}
  .oh{display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;padding:13px 16px;background:#fafbfa;border-bottom:1px solid var(--line)}
  .oh .id{font-weight:700}
  .oh .meta{font-size:12px;color:var(--sub)}
  .ob{padding:8px 16px 14px}
  .oactions{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 14px}
  .price-in{width:90px;text-align:right}
  td .unit{color:var(--sub);font-size:11px;margin-left:3px}
</style>
</head>
<body>
<header class="h-admin"><div class="wrap">
  <h1>🌿 GAOGAO 発注ポータル</h1>
  <div class="lead">承認・受付管理（GAOGAO用）</div>
  <nav class="tabs">
    <a href="index.html">📅 供給・発注</a>
    <a href="order-confirm.html">🧾 注文確認</a>
    <a href="admin.html" class="active">✅ 承認(管理)</a>
    <a href="jisseki.html">📊 納品実績</a>
  </nav>
</div></header>

<div class="wrap">
  <div class="card">
    <div class="row">
      <div><div class="muted">ステータス</div><select id="f-status">
        <option value="受付">受付（要対応）</option><option value="">すべて</option>
        <option>承認済み</option><option>納品済み</option><option>キャンセル</option></select></div>
      <div><div class="muted">会社</div><select id="f-company"><option value="">すべて</option></select></div>
      <div style="flex:1"></div>
      <button class="btn ghost sm" id="reload">↻ 更新</button>
    </div>
    <div id="conn" class="muted" style="margin-top:10px"></div>
  </div>
  <div id="state" class="card state">読み込み中…</div>
  <div id="list"></div>
</div>

<footer>GAOGAO 承認画面 ／ 「注文」タブと連携</footer>

<script src="assets/orders.js"></script>
<script>
let ORDERS=[];
const yen=n=>(n==null||n==='')?'–':'¥'+Math.round(n).toLocaleString();

function statusBadge(s){ return `<span class="badge s-${esc(s)}">${esc(s)}</span>`; }
function render(){
  const fs=document.getElementById('f-status').value, fc=document.getElementById('f-company').value;
  const list=ORDERS.filter(o=>(!fs||o.status===fs)&&(!fc||o.company===fc));
  const el=document.getElementById('list');
  if(list.length===0){ document.getElementById('state').classList.remove('hide'); document.getElementById('state').innerHTML='該当する注文はありません。'; el.innerHTML=''; return; }
  document.getElementById('state').classList.add('hide');
  let h='';
  list.forEach(o=>{
    let sub=0, hasAll=true;
    const rows=o.items.map(it=>{
      const p=it.price; if(p!=null) sub+=p*it.qty; else hasAll=false;
      return `<tr><td><b>${esc(it.jp)}</b> <span class="muted">${esc(it.call)}</span></td>
        <td class="num">${it.qty}<span class="unit">kg</span></td>
        <td class="num"><input class="price-in" type="number" min="0" step="10" value="${it.price??''}" data-id="${esc(o.id)}" data-call="${esc(it.call)}" placeholder="単価"></td>
        <td class="num">${p!=null?yen(p*it.qty):'–'}</td></tr>`;
    }).join('');
    h+=`<div class="order" data-id="${esc(o.id)}">
      <div class="oh">
        <span class="id">${esc(o.id)}</span> ${statusBadge(o.status)}
        <span class="meta">🏢 ${esc(o.company)} ／ 👤 ${esc(o.person)}</span>
        <span class="meta">受信 ${esc(fmtDate(o.received))} ／ 希望納品 ${esc(o.deliveryDate||'未定')}</span>
      </div>
      <div class="ob"><div class="scroll"><table>
        <thead><tr><th>品目</th><th class="num">数量</th><th class="num">単価(税抜)</th><th class="num">小計</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr><th colspan="3" class="num">合計(税抜)${hasAll?'':'（一部単価未設定）'}</th><th class="num">${yen(sub)}</th></tr></tfoot>
      </table></div>
      ${o.note?`<div class="muted" style="margin-top:8px">備考: ${esc(o.note)}</div>`:''}</div>
      <div class="oactions">
        <button class="btn" data-act="承認済み">単価を保存して承認</button>
        <button class="btn ghost" data-act="納品済み">納品済みにする</button>
        <button class="btn warn" data-act="キャンセル">キャンセル</button>
      </div></div>`;
  });
  el.innerHTML=h;
  el.querySelectorAll('.oactions .btn').forEach(b=>b.onclick=()=>act(b));
}

async function act(btn){
  const order=btn.closest('.order'); const id=order.dataset.id; const status=btn.dataset.act;
  const o=ORDERS.find(x=>x.id===id);
  btn.disabled=true;
  // 単価を保存（入力されているもの）
  const priceInputs=[...order.querySelectorAll('.price-in')];
  for(const inp of priceInputs){
    const v=parseFloat(inp.value);
    const it=o.items.find(x=>x.call===inp.dataset.call);
    if(!isNaN(v) && it && it.price!==v){
      const r=await postAction({action:'setPrice',id,call:inp.dataset.call,price:v});
      if(r.ok===false && r.error==='NO_WEBAPP'){ it.price=v; } else if(r.ok){ it.price=v; }
    }
  }
  // ステータス更新
  const r=await postAction({action:'setStatus',id,status});
  if(r.ok===false && r.error==='NO_WEBAPP'){ o.status=status; toast('⚠️ Apps Script未接続：画面上のみ反映（保存されません）'); }
  else if(r.ok){ o.status=status; toast('「'+status+'」に更新しました'); }
  else { toast('更新に失敗: '+(r.error||'')); btn.disabled=false; return; }
  render();
}

async function init(){
  document.getElementById('conn').innerHTML = CONFIG.ORDER_WEBAPP_URL
    ? '✅ Apps Script接続済み：承認・単価がスプレッドシートに保存されます。'
    : '⚠️ Apps Script未接続：操作は画面表示のみで保存されません。assets/orders.js の ORDER_WEBAPP_URL を設定してください。';
  document.getElementById('state').classList.remove('hide'); document.getElementById('state').textContent='読み込み中…';
  try{
    const items=await loadOrderItems(); ORDERS=groupOrders(items);
    const sel=document.getElementById('f-company'); [...new Set(ORDERS.map(o=>o.company).filter(Boolean))].forEach(c=>{const op=document.createElement('option');op.textContent=c;sel.appendChild(op);});
    if(ORDERS.length===0){ document.getElementById('state').innerHTML='まだ注文がありません。<br><span class="muted">カートから注文が入るとここに表示されます（Apps Script接続後）。</span>'; return; }
    render();
  }catch(e){ document.getElementById('state').innerHTML='⚠️ 取得失敗：'+esc(e.message); }
}
['f-status','f-company'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('reload').onclick=init;
init();
</script>
</body>
</html>
