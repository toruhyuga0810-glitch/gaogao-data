<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GAOGAO 承認・受付管理</title>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="assets/app.css">
<style>
  .order{border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:14px;overflow:hidden}
  .oh{display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;padding:13px 16px;background:#fafbfa;border-bottom:1px solid var(--line)}
  .oh .id{font-weight:700}
  .oh .meta{font-size:12px;color:var(--sub)}
  .ob{padding:8px 16px 14px}
  .oactions{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 14px}
  .price-in{width:90px;text-align:right}
  .qty-in{width:64px;text-align:right}
  td .unit{color:var(--sub);font-size:11px;margin-left:3px}
  .lockcard{text-align:center;padding:34px 22px;max-width:420px;margin:6px auto}
  .lockcard h2{margin:8px 0 4px}
  .lockrow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
  .lockcard input{width:230px;text-align:center;letter-spacing:1px}
  .gate-err{color:var(--cancel);font-size:13px;margin-top:12px;min-height:18px}
  .lockcard .exit{margin-top:18px;font-size:12px;color:var(--sub)}
  .lockcard .exit a{color:var(--green-d)}
</style>
</head>
<body>
<header class="h-admin"><div class="wrap">
  <h1>🌿 GAOGAO 発注ポータル</h1>
  <div class="lead">承認・受付管理（GAOGAO用）</div>
  <nav class="tabs">
    <a href="index.html">🏠 ホーム</a>
    <a href="hatchu.html">📅 供給・発注</a>
    <a href="order-confirm.html">🧾 注文確認</a>
    <a href="jisseki.html">📊 納品実績</a>
    <a href="keiziban.html">📋 掲示板</a>
    <a href="admin.html" class="active">✅ 承認(管理)</a>
  </nav>
</div></header>

<div class="wrap">
  <!-- コンテンツ・ロック（パスワードで中身を解錠。ヘッダーのタブで他ページへ移動できます） -->
  <div id="lockcard" class="card lockcard">
    <div style="font-size:36px">🔒</div>
    <h2>承認・受付管理（GAOGAO専用）</h2>
    <div class="muted">このページの内容を見るにはパスワードが必要です。</div>
    <div class="lockrow">
      <input id="gate-pw" type="text" placeholder="パスワード" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button class="btn" id="gate-go">開く</button>
    </div>
    <div class="gate-err" id="gate-err"></div>
    <div class="muted" style="font-size:12px;margin-top:8px">一度入力すると、この端末では次回から自動で開きます（解除は画面内の「🔒ロック」）。</div>
    <div class="exit">GAOGAO以外の方はこちらへ →
      <a href="index.html">ホーム</a> ／ <a href="hatchu.html">供給・発注</a> ／ <a href="order-confirm.html">注文確認</a> ／ <a href="jisseki.html">納品実績</a>
    </div>
  </div>

  <div id="admin-content" class="hide">
    <div class="card">
      <div class="row">
        <div><div class="muted">ステータス</div><select id="f-status">
          <option value="受付">受付（要対応）</option><option value="">すべて</option>
          <option>承認済み</option><option>納品済み</option><option>キャンセル</option></select></div>
        <div><div class="muted">会社</div><select id="f-company"><option value="">すべて</option></select></div>
        <div style="flex:1"></div>
        <button class="btn ghost sm" id="lock-again">🔒 ロック</button>
        <button class="btn ghost sm" id="reload">↻ 更新</button>
      </div>
      <div id="conn" class="muted" style="margin-top:10px"></div>
    </div>
    <div id="state" class="card state">読み込み中…</div>
    <div id="list"></div>
  </div>
</div>

<footer>GAOGAO 承認画面 ／ 「注文」タブと連携</footer>

<script src="assets/orders.js"></script>
<script>
let ORDERS=[];
const yen=n=>(n==null||n==='')?'–':'¥'+Math.round(n).toLocaleString();

function statusBadge(s){ return `<span class="badge s-${esc(s)}">${esc(s)}</span>`; }
function render(){
  const fs=document.getElementById('f-status').value, fc=document.getElementById('f-company').value;
  const list=ORDERS.filter(o=>(!fs||o.status===fs)&&(!fc||o.company===fc));
  const el=document.getElementById('list');
  if(list.length===0){ document.getElementById('state').classList.remove('hide'); document.getElementById('state').innerHTML='該当する注文はありません。'; el.innerHTML=''; return; }
  document.getElementById('state').classList.add('hide');
  let h='';
  list.forEach(o=>{
    let sub=0, hasAll=true;
    const editable=(o.status==='受付');
    const rows=o.items.map(it=>{
      const p=it.price; if(p!=null) sub+=p*it.qty; else hasAll=false;
      const qtyCell = editable
        ? `<input class="qty-in" type="number" min="0" step="1" value="${it.qty}" data-id="${esc(o.id)}" data-call="${esc(it.call)}"><span class="unit">kg</span>`
        : `${it.qty}<span class="unit">kg</span>`;
      return `<tr><td><b>${esc(it.jp)}</b> <span class="muted">${esc(it.call)}</span></td>
        <td class="num">${qtyCell}</td>
        <td class="num"><input class="price-in" type="number" min="0" step="10" value="${it.price??''}" data-id="${esc(o.id)}" data-call="${esc(it.call)}" placeholder="単価"></td>
        <td class="num">${p!=null?yen(p*it.qty):'–'}</td></tr>`;
    }).join('');
    h+=`<div class="order" data-id="${esc(o.id)}">
      <div class="oh">
        <span class="id">${esc(o.id)}</span> ${statusBadge(o.status)}
        <span class="meta">🏢 ${esc(o.company)} ／ 👤 ${esc(o.person)}</span>
        <span class="meta">受信 ${esc(fmtDate(o.received))} ／ 希望納品 ${esc(o.deliveryDate||'未定')}</span>
      </div>
      <div class="ob"><div class="scroll"><table>
        <thead><tr><th>品目</th><th class="num">数量</th><th class="num">単価(税抜・任意)</th><th class="num">小計</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr><th colspan="3" class="num">合計(税抜)${hasAll?'':'（一部単価未設定）'}</th><th class="num">${yen(sub)}</th></tr></tfoot>
      </table></div>
      ${o.note?`<div class="muted" style="margin-top:8px">備考: ${esc(o.note)}</div>`:''}</div>
      <div class="oactions">
        <button class="btn" data-act="承認済み">この内容で承認（顧客へメール）</button>
        <button class="btn ghost" data-act="納品済み">納品済みにする</button>
        <button class="btn warn" data-act="キャンセル">キャンセル</button>
      </div>
      ${editable?'<div class="muted" style="padding:0 16px 12px">※ 欠品時は数量を変更してから承認してください。承認すると納品可能数が顧客へメール送信されます。単価は空欄でもOK（仕入れ先確定後に入力可）。</div>':''}</div>`;
  });
  el.innerHTML=h;
  el.querySelectorAll('.oactions .btn').forEach(b=>b.onclick=()=>act(b));
  // 数量・単価の変更で小計/合計をその場で再計算（欠品調整の確認用）
  el.querySelectorAll('.qty-in,.price-in').forEach(inp=>inp.addEventListener('change',e=>{
    const t=e.target; const o=ORDERS.find(x=>x.id===t.dataset.id); if(!o) return;
    const it=o.items.find(x=>x.call===t.dataset.call); if(!it) return;
    if(t.classList.contains('qty-in')) it.qty=Math.max(0,Math.round(parseFloat(t.value)||0));
    else it.price=(t.value===''?null:parseFloat(t.value));
    render();
  }));
}

let ADMIN_TOKEN_VAL='';
async function act(btn){
  const order=btn.closest('.order'); const id=order.dataset.id; const status=btn.dataset.act;
  const o=ORDERS.find(x=>x.id===id);
  btn.disabled=true;
  const tk=ADMIN_TOKEN_VAL;
  // 数量の変更を保存（欠品調整。0で明細削除）
  const qtyInputs=[...order.querySelectorAll('.qty-in')];
  for(const inp of qtyInputs){
    const q=Math.max(0,Math.round(parseFloat(inp.value)||0));
    const it=o.items.find(x=>x.call===inp.dataset.call);
    if(it && q!==it.qty){
      const r=await postAction({action:'updateItem',id,call:inp.dataset.call,qty:q});
      if(r.ok===false && r.error==='NO_WEBAPP'){ it.qty=q; } else if(r.ok){ it.qty=q; }
    }
  }
  o.items=o.items.filter(it=>it.qty>0);
  // 単価を保存（入力されているもの）
  const priceInputs=[...order.querySelectorAll('.price-in')];
  for(const inp of priceInputs){
    const v=parseFloat(inp.value);
    const it=o.items.find(x=>x.call===inp.dataset.call);
    if(!isNaN(v) && it && it.price!==v){
      const r=await postAction({action:'setPrice',id,call:inp.dataset.call,price:v,token:tk});
      if(r.ok===false && r.error==='NO_WEBAPP'){ it.price=v; } else if(r.ok){ it.price=v; }
    }
  }
  // ステータス更新
  const r=await postAction({action:'setStatus',id,status,token:tk});
  if(r.ok===false && r.error==='NO_WEBAPP'){ o.status=status; toast('⚠️ Apps Script未接続：画面上のみ反映（保存されません）'); }
  else if(r.ok){ o.status=status; toast('「'+status+'」に更新しました'); }
  else if(r.error==='unauthorized'){ toast('権限エラー：ログインし直してください'); localStorage.removeItem('gaogao_admin_token'); location.reload(); return; }
  else { toast('更新に失敗: '+(r.error||'')); btn.disabled=false; return; }
  render();
}

async function init(){
  document.getElementById('conn').innerHTML = CONFIG.ORDER_WEBAPP_URL
    ? '✅ Apps Script接続済み：承認・単価がスプレッドシートに保存されます。'
    : '⚠️ Apps Script未接続：操作は画面表示のみで保存されません。assets/orders.js の ORDER_WEBAPP_URL を設定してください。';
  document.getElementById('state').classList.remove('hide'); document.getElementById('state').textContent='読み込み中…';
  try{
    const items=await loadOrderItems(); ORDERS=groupOrders(items);
    const sel=document.getElementById('f-company'); [...new Set(ORDERS.map(o=>o.company).filter(Boolean))].forEach(c=>{const op=document.createElement('option');op.textContent=c;sel.appendChild(op);});
    if(ORDERS.length===0){ document.getElementById('state').innerHTML='まだ注文がありません。<br><span class="muted">カートから注文が入るとここに表示されます（Apps Script接続後）。</span>'; return; }
    render();
  }catch(e){ document.getElementById('state').innerHTML='⚠️ 取得失敗：'+esc(e.message); }
}
['f-status','f-company'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('reload').onclick=init;

// ===== コンテンツ・ロック（GAOGAO専用） =====
const TOKEN_KEY='gaogao_admin_token';
const $=id=>document.getElementById(id);
async function tryAuth(pw){ return await postAction({action:'auth',token:pw}); }
function showContent(){ $('lockcard').classList.add('hide'); $('admin-content').classList.remove('hide'); }
function showLock(){ $('admin-content').classList.add('hide'); $('lockcard').classList.remove('hide'); $('gate-pw').value=''; $('gate-pw').focus(); }
function unlock(pw){ ADMIN_TOKEN_VAL=pw; showContent(); init(); }
function lockAgain(){ localStorage.removeItem(TOKEN_KEY); ADMIN_TOKEN_VAL=''; showLock(); }
async function gateInit(){
  if(!CONFIG.ORDER_WEBAPP_URL){ showContent(); init(); return; } // 未接続時はデモ表示
  const saved=localStorage.getItem(TOKEN_KEY);
  if(saved){ const r=await tryAuth(saved); if(r && r.ok===true){ unlock(saved); return; } }
  const go=$('gate-go'), pw=$('gate-pw'), err=$('gate-err');
  async function submit(){
    go.disabled=true; err.textContent='確認中…';
    const r=await tryAuth(pw.value);
    if(r && r.ok===true){ localStorage.setItem(TOKEN_KEY,pw.value); err.textContent=''; unlock(pw.value); }
    else if(r && r.error && String(r.error).indexOf('unknown action')>=0){
      err.innerHTML='⚠️ サーバー(Apps Script)が未更新です。<br>コードを更新して「新バージョンで再デプロイ」してください。'; go.disabled=false; }
    else { err.textContent='パスワードが違います'; go.disabled=false; }
  }
  go.onclick=submit;
  pw.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
  pw.focus();
}
document.getElementById('lock-again').onclick=lockAgain;
gateInit();
</script>
</body>
</html>
