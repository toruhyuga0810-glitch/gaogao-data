<div class="wrap">
  <div class="card">
    <div class="row">
      <div><div class="muted">分類でしぼり込み</div>
        <select id="f-cat"><option value="">すべて</option>
          <option>生育状況</option><option>生育遅延</option><option>天候</option><option>病害虫</option><option>その他</option></select></div>
      <div style="flex:1"></div>
      <button class="btn ghost sm" id="reload">↻ 更新</button>
    </div>
    <div class="muted" style="margin-top:8px">Discordの専用チャンネルに投稿された内容がここに反映されます。新しい順に表示。畑の写真は<a href="photos.html" style="color:var(--green-d)">圃場生育状況</a>へ。</div>

<footer>GAOGAO 掲示板 ／ Discord「生育情報」チャンネルと連携（予定）</footer>

<script src="assets/orders.js"></script>
<script>
const BOARD_SHEET="掲示板";
let POSTS=[];
let BOARD_TH={};   // 日本語本文 → タイ語訳（data/board_th.json。タイ語UI時に本文を差し替え）
const CATS=['生育状況','生育遅延','天候','病害虫','その他'];

async function loadBoard(){
  const rows=await fetchSheet(BOARD_SHEET);
  const hi=rows.findIndex(r=>r.some(c=>{const t=String(c).trim();return t==='本文'||t==='内容'||t==='メッセージ';}));
  if(hi<0) return [];
  const head=rows[hi].map(s=>String(s).trim());
  const col=names=>{ for(const n of names){ const i=head.indexOf(n); if(i>=0) return i; } return -1; };
  const ci={ when:col(['日時','投稿日時','日付','timestamp']), cat:col(['分類','カテゴリ','種別']), body:col(['本文','内容','メッセージ']), who:col(['投稿者','名前','author','ユーザー']) };
  const out=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i]; const body=ci.body>=0?String(r[ci.body]||'').trim():'';
    if(!body) continue;
    let cat=ci.cat>=0?String(r[ci.cat]||'').trim():''; if(!CATS.includes(cat)) cat=cat||'その他';
    out.push({ when:ci.when>=0?String(r[ci.when]||'').trim():'', cat, body, who:ci.who>=0?String(r[ci.who]||'').trim():'' });
  }
  // 新しい順（日時が取れれば降順）
  out.sort((a,b)=> (a.when<b.when?1:-1));
  return out;
}
function render(){
  const LANG=(localStorage.getItem('gaogao_lang')||'ja');
  const f=document.getElementById('f-cat').value;
  const list=POSTS.filter(p=>!f||p.cat===f);
  const feed=document.getElementById('feed'), state=document.getElementById('state');
  if(list.length===0){
    feed.innerHTML=''; state.classList.remove('hide');
    state.innerHTML=POSTS.length===0
      ? 'まだ投稿がありません。<br><span class="muted">Discordの「生育情報」チャンネルに投稿すると、ここに自動で表示されます（連携後に有効）。</span>'
      : '該当する分類の投稿はありません。';
    return;
  }
  state.classList.add('hide');
  feed.innerHTML=list.map(p=>{
    const cat=CATS.includes(p.cat)?p.cat:'その他';
    const bodyText=(LANG==='th' && BOARD_TH[p.body])? BOARD_TH[p.body] : p.body;
    return `<div class="post c-${cat}">
      <div class="top"><span class="cat ${cat}">${esc(cat)}</span><span class="when">${esc(fmtDate(p.when)||p.when)}</span></div>
      <div class="body">${esc(bodyText).replace(/\*\*([^*\n]+)\*\*/g,'<b>$1</b>')}</div>
      ${p.who?`<div class="who">— ${esc(p.who)}</div>`:''}
    </div>`;
  }).join('');
}
async function loadBoardTh(){
  try{ const res=await fetch('data/board_th.json?t='+Date.now(),{cache:'no-store'}); if(res.ok) BOARD_TH=await res.json(); }
  catch(e){ BOARD_TH={}; }
}
async function init(){
  document.getElementById('state').classList.remove('hide');
  document.getElementById('state').textContent='読み込み中…';
  try{ await loadBoardTh(); POSTS=await loadBoard(); render(); }
  catch(e){
    document.getElementById('state').innerHTML='掲示板はまだ準備中です。<br><span class="muted">Discord連携（Botで「生育情報」チャンネルを取り込み）を設定すると表示されます。'+esc(e.message)+'</span>';
  }
}
document.getElementById('f-cat').addEventListener('change',render);
document.getElementById('reload').onclick=init;
init();
</script>
